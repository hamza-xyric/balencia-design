<svg width="720" height="1280" viewBox="0 0 720 1280" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Balencia carousel SIA presence start frame</title>
  <desc id="desc">An abstract coach presence made from restrained purple rings and warm light, without a face or avatar.</desc>
  <defs>
    <radialGradient id="bg" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(360 486) rotate(90) scale(520 430)">
      <stop stop-color="#211008"/>
      <stop offset="1" stop-color="#0C0603"/>
    </radialGradient>
    <radialGradient id="presence" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(360 454) rotate(90) scale(118 102)">
      <stop stop-color="#F2ECD8" stop-opacity="0.88"/>
      <stop offset="0.58" stop-color="#FF5E00" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#7F24FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="purpleGlow" x="-80%" y="-80%" width="260%" height="260%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="22" flood-color="#7F24FF" flood-opacity="0.34"/>
    </filter>
    <filter id="orangeGlow" x="-80%" y="-80%" width="260%" height="260%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="20" flood-color="#FF5E00" flood-opacity="0.22"/>
    </filter>
    <style>
      .line { stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>
  <rect width="720" height="1280" fill="url(#bg)"/>
