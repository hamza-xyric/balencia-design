<svg width="720" height="1280" viewBox="0 0 720 1280" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Balencia carousel life domains start frame</title>
  <desc id="desc">Nine life-domain symbols joining into one connected system with a single orange flow line.</desc>
  <defs>
    <radialGradient id="bg" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(360 480) rotate(90) scale(540 420)">
      <stop stop-color="#211008"/>
      <stop offset="1" stop-color="#0C0603"/>
    </radialGradient>
    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#0C0603" flood-opacity="0.42"/>
    </filter>
    <filter id="orangeGlow" x="-80%" y="-80%" width="260%" height="260%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="13" flood-color="#FF5E00" flood-opacity="0.44"/>
    </filter>
    <filter id="greenGlow" x="-80%" y="-80%" width="260%" height="260%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="11" flood-color="#34A853" flood-opacity="0.32"/>
    </filter>
    <style>
      .line { stroke-linecap: round; stroke-linejoin: round; }
      .paper { stroke: #F2ECD8; }
      .orange { stroke: #FF5E00; }
      .green { stroke: #34A853; }
      .purple { stroke: #7F24FF; }
      .node { fill: #211008; stroke-width: 3; filter: url(#shadow); }
      .nodeOrange { fill: rgba(255,94,0,0.14); }
      .nodeGreen { fill: rgba(52,168,83,0.12); }
      .nodePurple { fill: rgba(127,36,255,0.10); }
    </style>
    <symbol id="fitness" viewBox="-36 -36 72 72">
      <path class="paper line" stroke-width="6" d="M-24 0H24"/>
      <path class="paper line" stroke-width="6" d="M-32-12V12M32-12V12"/>
      <path class="green line" stroke-width="4" d="M-15 20C-7 5 1 5 9 20C14 29 20 29 25 20"/>
    </symbol>
    <symbol id="nutrition" viewBox="-36 -36 72 72">
      <path class="paper line" stroke-width="5" d="M-22-1H21C19 20 7 28-8 28C-21 28-28 16-22-1Z"/>
      <path class="green line" stroke-width="5" d="M1-12C7-26 21-25 27-15C16-13 8-8 1 0"/>
    </symbol>
    <symbol id="sleep" viewBox="-36 -36 72 72">
      <path class="paper line" stroke-width="6" d="M14-25C2-21-7-10-7 2C-7 14 2 24 15 27C7 32-5 31-16 23C-28 13-30-4-22-18C-15-30 1-34 14-25Z"/>
      <path class="purple line" stroke-width="4" d="M17 16H25"/>
    </symbol>
    <symbol id="finance" viewBox="-36 -36 72 72">
      <path class="paper line" stroke-width="5" d="M-23 18H-8M-16 18V-2M-2 18H13M6 18V-14M18 18H30M24 18V-23"/>
      <path class="green line" stroke-width="5" d="M-24-15L-9-24L2-13L25-29"/>
    </symbol>
    <symbol id="career" viewBox="-36 -36 72 72">
      <path class="paper line" stroke-width="5" d="M-25-5H25V24H-25V-5Z"/>
      <path class="paper line" stroke-width="5" d="M-9-5V-18H9V-5"/>
      <path class="green line" stroke-width="4" d="M-17 12H17"/>
    </symbol>
    <symbol id="relationships" viewBox="-36 -36 72 72">
      <path class="paper line" stroke-width="5" d="M-18 6C-30-5-24-24-10-22C-3-21 1-17 3-12C5-17 9-22 17-22C31-21 35-4 23 7L3 26L-18 6Z"/>
      <path class="green line" stroke-width="3" d="M-18 6L3 26L23 7"/>
    </symbol>
    <symbol id="creativity" viewBox="-36 -36 72 72">
      <path class="paper line" stroke-width="5" d="M-14 24C-5 17 0 9 0 1C0-12 9-19 21-23C17-11 11-2 3 4"/>
      <path class="orange line" stroke-width="5" d="M-20 27C-25 20-22 13-15 11C-7 9-2 14 0 21C-7 19-12 21-20 27Z"/>
    </symbol>
    <symbol id="spirituality" viewBox="-36 -36 72 72">
      <path class="paper line" stroke-width="5" d="M0 26C-15 17-24 4-24-10C-12-9-3-4 0 7C3-4 12-9 24-10C24 4 15 17 0 26Z"/>
      <path class="purple line" stroke-width="3" d="M0 26V-14"/>
    </symbol>
    <symbol id="learning" viewBox="-36 -36 72 72">
      <path class="paper line" stroke-width="5" d="M-24-20C-13-24-4-20 0-13C4-20 13-24 24-20V22C13 18 4 20 0 27C-4 20-13 18-24 22V-20Z"/>
      <path class="green line" stroke-width="3" d="M0-13V27"/>
    </symbol>
  </defs>
  <rect width="720" height="1280" fill="url(#bg)"/>
  <circle cx="360" cy="470" r="258" stroke="#F2ECD8" stroke-opacity="0.08" stroke-width="2"/>
  <path class="orange line" filter="url(#orangeGlow)" stroke-width="10" d="M179 344C243 192 422 210 512 302C626 418 556 629 372 675C205 717 117 531 179 344Z"/>
  <path class="green line" filter="url(#greenGlow)" stroke-width="5" d="M214 557C271 435 422 407 502 509"/>

  <g transform="translate(218 298)"><circle r="45" class="node orange nodeOrange"/><use href="#fitness" width="72" height="72" x="-36" y="-36"/></g>
  <g transform="translate(360 244)"><circle r="45" class="node green nodeGreen"/><use href="#sleep" width="72" height="72" x="-36" y="-36"/></g>
  <g transform="translate(503 304)"><circle r="45" class="node green nodeGreen"/><use href="#career" width="72" height="72" x="-36" y="-36"/></g>
  <g transform="translate(177 456)"><circle r="45" class="node green nodeGreen"/><use href="#nutrition" width="72" height="72" x="-36" y="-36"/></g>
  <g transform="translate(543 456)"><circle r="45" class="node green nodeGreen"/><use href="#finance" width="72" height="72" x="-36" y="-36"/></g>
  <g transform="translate(232 616)"><circle r="45" class="node orange nodeOrange"/><use href="#relationships" width="72" height="72" x="-36" y="-36"/></g>
  <g transform="translate(360 690)"><circle r="45" class="node purple nodePurple"/><use href="#spirituality" width="72" height="72" x="-36" y="-36"/></g>
  <g transform="translate(488 616)"><circle r="45" class="node orange nodeOrange"/><use href="#creativity" width="72" height="72" x="-36" y="-36"/></g>
  <g transform="translate(360 465)"><circle r="58" class="node orange nodeOrange"/><use href="#learning" width="82" height="82" x="-41" y="-41"/></g>
</svg>
