version: '3.8'

services:
  # Next.js Client Service
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: balencia-client
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://server:5000/api
    depends_on:
      - server
    networks:
      - balencia-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Node.js/Express Server Service
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: balencia-server
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - HOST=0.0.0.0
      # Database connection (adjust as needed)
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@host.docker.internal:5432/balencia?schema=public}
      # Add other required environment variables
      # - JWT_SECRET=${JWT_SECRET}
      # - REDIS_URL=${REDIS_URL}
      # - CORS_ORIGIN=http://localhost:3000,http://client:3000
    networks:
      - balencia-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  balencia-network:
    driver: bridge

